{% extends "gitlab-build-job.base.yml" %} {# Default build template #}

{% block build_header %}
  extends:
    - .job_template
    - .build_cache_template
{% endblock %}

{% block build_tags %}
    - vpn-apple-builds
    - $PIPELINE_HOST
{% endblock %}

{% block fastlane_build_args %}
{{ block.super }}
{%- if config.build.ci.tagName %}
        "describe_directory:$DESCRIBE_DIR/release"
{% else %}
        "describe_directory:$DESCRIBE_DIR/{{ config.name }}"
{% endif %}
{% endblock %}

{% block build_script %}
    - | # Restore modification times of files, according to git history...
      git restore-mtime --force

      pushd "external"
      for submodule in $(ls); do
          pushd "$submodule"
          echo "Updating mtimes for $submodule..."
          git restore-mtime --force
          popd
      done
      popd

      CHECKOUTS="$DERIVED_DATA_PATH/SourcePackages/checkouts"
      if [ -d "$CHECKOUTS" ]; then
          pushd "$CHECKOUTS"
          for dependency in $(ls); do
              pushd "$dependency"
              echo "Updating mtimes for $dependency..."
              git restore-mtime --force
              popd
          done
          popd
      fi
    - |
      ./Integration/Scripts/replace_dotenv.sh -e "$NAMES_DOTENV" \
          libraries/Foundations/Strings/Sources/Strings/Strings.swift \
          libraries/Foundations/Strings/Sources/Strings/Resources/en.lproj/* \
          libraries/Foundations/Domain/Sources/Domain/Constants.swift
{{ block.super }}
{% endblock %}

{#
 # For merge results, everything is manual.
 # Merge requests can build the app optionally by manual action.
 # Lastly, build the app automatically for tags, but keep test builds manual.
 #}
{% block build_rules %}
{# We have to use the template here, because $CI_PIPELINE_SOURCE is always "parent_pipeline". #}
{% if config.build.ci.eventType == "merge_request_event" or config.build.userProperties.isSliTestEnabled == "true"%}
{% if config.build.ci.refName == config.userProperties.releaseBranch and config.build.userProperties.isSliTestEnabled != "true"%}
    - when: manual
{% else %}
    - if: $TARGET == "app" && (($DESTINATION == "Physical" && $CONFIGURATION != "Debug") || ($DESTINATION == "Simulator" && $CONFIGURATION == "Debug"))
      when: manual
      allow_failure: true
    - if: $TARGET == "tests"
      when: on_success
    - when: never
{% endif %}
{% elif config.build.ci.tagName %}
    - if: $TARGET == "app" && (($DESTINATION == "Physical" && $CONFIGURATION != "Debug") || ($DESTINATION == "Simulator" && $CONFIGURATION == "Debug"))
      when: on_success
    - if: $TARGET == "tests"
      when: manual
      allow_failure: true
    - when: never
{% else %}
    - if: $TARGET == "tests" && $DESTINATION == "Simulator"
      when: on_success
    - if: $TARGET == "app" && (($DESTINATION == "Physical" && $CONFIGURATION != "Debug") || ($DESTINATION == "Simulator" && $CONFIGURATION == "Debug"))
      when: on_success
    - when: never
{% endif %}
{% endblock %}

