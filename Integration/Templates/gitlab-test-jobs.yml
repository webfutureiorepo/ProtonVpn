{% extends "gitlab-test-job.base.yml" %} {# Default test template #}

{% block test_job_name %}.test_job_template{% endblock %}
{% block testplan_name %}{{ config.build.productName }}-{{ config.build.platform }}-$TEST_SUITE{% endblock %}

{% block test_tags %}
    - vpn-{{ config.build.platform|lowercase }}-tests
    - $PIPELINE_HOST
{% endblock %}

{% block test_vars %}
{{ block.super }}
    GIT_DEPTH: 1
    GIT_SUBMODULE_STRATEGY: none
    DERIVED_DATA_CACHE_POLICY: pull
    MINT_CACHE_POLICY: pull
    TEST_SUITE: Unit-All
    TEST_RUNNER_CI_PROJECT_DIR: $CI_PROJECT_DIR
{% endblock %}

{% block test_header %}
  extends:
    - .job_template
    - .build_cache_template
{% endblock %}

{% block test_footer %}

# Unit tests run automatically on every job, provided the upstream pipelines (e.g. builds) are run.
test:{{ config.name }}:unit:
  rules:
  {% if config.name == "mac" %}
    # macOS tests are disabled until VPNAPPL-2607 is resolved.
    - when: manual
      allow_failure: true
  {% else %}
    - if: $SLI_TEST == "true"
      when: never
    - when: on_success
  {% endif %}
  extends:
    - .test_job_template
  stage: test
  variables:
    TEST_SUITE: Unit-All

.ui_test_template:
  extends:
    - .test_job_template
  stage: test_ui
  needs:
    - !reference [.test_job_template, needs]

# Smoke UI tests run for all merge request events, including merged results.
test:{{ config.name }}:ui:smoke:
  stage: test_ui
  variables:
    TEST_SUITE: UI-Smoke
  extends:
    - .ui_test_template
  rules:
{% if config.name == "mac" or config.build.userProperties.isSliTestEnabled == "true" %}
    - when: never
{% elif config.build.ci.eventType == "merge_request_event" %}
    - when: on_success
{% else %}
    - when: manual
      allow_failure: true
{% endif %}

# UI tests run automatically on scheduled pipelines only.
test:{{ config.name }}:ui:all:
  stage: test_ui
  variables:
    TEST_SUITE: UI-All
  extends:
    - .ui_test_template
  rules:
  {% if config.name == "mac" or config.build.userProperties.isSliTestEnabled == "true" %}
    - when: never
  {% elif config.build.ci.eventType == "schedule" %}
    - when: on_success
  {% else %}
    - when: manual
      allow_failure: true
  {% endif %}

# SLI Tests run automatically on schedules only.
test:{{ config.name }}:sli:all:
  stage: test_ui
  variables:
    TEST_SUITE: SLI-All
  extends:
    - .ui_test_template
  rules:
    {% if config.name == "mac" %}
    - when: manual
      allow_failure: true
    {% elif config.build.ci.eventType == "schedule" and config.build.userProperties.isSliTestEnabled == "true" %}
    - when: on_success
    {% else %}
    - when: manual
      allow_failure: true
    {% endif %}

{% endblock %}
